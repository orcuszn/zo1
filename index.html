<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry Letter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #2b2b2b;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
        }
        
        /* Read Me Button */
        .readme-btn {
            width: 100%;
            padding: 25px;
            font-size: 28px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            background: #ffb6c1; /* Light pink button */
            border: 4px solid #ff69b4;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 8px 0 #ff69b4;
            transition: all 0.1s ease;
            letter-spacing: 2px;
            color: #4a3729;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .readme-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #ff69b4;
        }
        
        .readme-btn span {
            font-size: 16px;
            display: block;
            color: #6b5a4a;
            margin-top: 5px;
            text-transform: none;
            font-style: italic;
        }
        
        /* Paper Message Box - PINK */
        .message-box {
            background: #fff0f5; /* Lavender blush - soft pink */
            border: 2px solid #ff69b4;
            border-radius: 20px;
            padding: 25px;
            position: relative;
            box-shadow: 10px 10px 0 rgba(255, 105, 180, 0.2);
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        /* Paper texture effect */
        .message-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 45%, #ffe4ec 45%, #ffe4ec 55%, transparent 55%);
            background-size: 20px 20px;
            opacity: 0.3;
            border-radius: 20px;
            pointer-events: none;
        }
        
        /* Folded corner effect */
        .message-box::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #fff0f5 50%, #ff69b4 50%);
            border-radius: 0 20px 0 20px;
        }
        
        /* Message content */
        .message-content {
            position: relative;
            z-index: 1;
            min-height: 400px;
        }
        
        .message-title {
            font-size: 32px;
            color: #ff1493;
            border-bottom: 2px dashed #ff69b4;
            padding-bottom: 15px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .message-text {
            font-size: 20px;
            line-height: 2;
            color: #8b4513;
            margin-bottom: 20px;
            white-space: pre-line;
            text-align: center;
        }
        
        .signature {
            text-align: right;
            font-style: italic;
            color: #ff69b4;
            margin-top: 30px;
            font-size: 18px;
        }
        
        /* Decorative elements */
        .paper-line {
            width: 100%;
            height: 2px;
            background: repeating-linear-gradient(90deg, transparent, transparent 5px, #ffb6c1 5px, #ffb6c1 10px);
            margin: 15px 0;
        }

        /* Comment for where to put your letter - THIS IS WHERE YOU PUT YOUR LETTER */
        .letter-spot {
            border: 2px dashed #ff69b4;
            background: rgba(255, 255, 255, 0.5);
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            min-height: 150px;
            color: #ff1493;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Read Me Button -->
        <button class="readme-btn" onclick="showMessage()">
            READ ME WHEN YOU'RE READY
        </button>
        
        <!-- Paper Message Box - ONE PAGE ONLY -->
        <div class="message-box" id="messageBox">
            <div class="message-content">
                <div class="message-title">IM SORRY</div>
                <div class="paper-line"></div>
                
                <!-- =========================================== -->
                <!-- ====== 👇 PUT YOUR LETTER HERE 👇 ====== -->
                <!-- =========================================== -->
                <div class="message-text">
                    MY LETTER
                    
                    <!-- THIS IS WHERE YOU TYPE YOUR MESSAGE -->
                    <!-- Just replace this text with your letter -->
                    
                    Dear you,
                    
                    I'm really sorry for what happened.
                    I hope you can forgive me.
                    
                    With all my heart,
                    [Your name]
                </div>
                <!-- =========================================== -->
                <!-- ====== 👆 YOUR LETTER ENDS HERE 👆 ====== -->
                <!-- =========================================== -->
                
                <div class="paper-line"></div>
                <div class="signature">- From me</div>
            </div>
        </div>
    </div>

    <script>
        // Function to show the message box
        function showMessage() {
            document.getElementById('messageBox').style.display = 'block';
        }
    </script>
</body>
</html>
